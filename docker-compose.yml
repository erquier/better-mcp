services:
  better-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: better-mcp
    ports:
      - "3100:3100"
    volumes:
      - ./:/project:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/mcp}
      - MCP_CONFIG_PATH=/project/mcp-config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
